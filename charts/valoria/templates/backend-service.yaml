apiVersion: v1
kind: Service
metadata:
  name: valoria-backend
  namespace: {{ include "valoria.namespace" . }}
  labels:
    {{- include "valoria.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: valoria-backend
  ports:
  - name: http
    port: {{ .Values.backend.port }}
    targetPort: {{ .Values.backend.port }}
