apiVersion: apps/v1
kind: Deployment
metadata:
  name: valoria-backend
  namespace: {{ include "valoria.namespace" . }}
  labels:
    {{- include "valoria.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: valoria-backend
  template:
    metadata:
      labels:
        app: valoria-backend
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
      - name: backend
        image: {{ .Values.backend.image }}
        imagePullPolicy: {{ .Values.backend.imagePullPolicy }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: {{ .Values.backend.port }}
        env:
        - name: PORT
          value: {{ .Values.backend.port | quote }}
        - name: NODE_ENV
          value: "production"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: valoria-secrets
              key: db-host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: valoria-secrets
              key: db-port
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: valoria-secrets
              key: db-name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: valoria-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: valoria-secrets
              key: db-password
        - name: JWT_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: valoria-secrets
              key: jwt-private-key
        - name: JWT_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: valoria-secrets
              key: jwt-public-key
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: valoria-secrets
              key: stripe-secret-key
              optional: true
        - name: STRIPE_PUBLISHABLE_KEY
          valueFrom:
            secretKeyRef:
              name: valoria-secrets
              key: stripe-publishable-key
              optional: true
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 8
          periodSeconds: 8
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
