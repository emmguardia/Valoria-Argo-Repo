namespace: valoria

sealedSecret:
  enabled: false

imagePullSecrets:
  - name: ghcr-secret

frontend:
  # Image nginx (build du Frontend)
  image: ghcr.io/emmguardia/valoria-front@sha256:9b3bf735de6cac7f022efec1f8442656d4ed1dd0d1a1e463f3228aaf99631858
  imagePullPolicy: IfNotPresent
  replicas: 1
  serviceType: ClusterIP
  port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80

nginx:
  # Si tu as un backend plus tard, tu pourras activer le proxy /api/
  apiProxy:
    enabled: false
    upstream: http://valoria-backend:3000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: valoria.zenixweb.fr
  tls:
    enabled: true
    secretName: valoria-tls
