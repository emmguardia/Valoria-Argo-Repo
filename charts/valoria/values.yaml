namespace: valoria

imagePullSecrets:
  - name: ghcr-secret

frontend:
  # Image nginx (build du Frontend)
  image: ghcr.io/REPLACE_ME/valoria-front:latest
  imagePullPolicy: IfNotPresent
  replicas: 1
  serviceType: NodePort
  port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80

nginx:
  # Si tu as un backend plus tard, tu pourras activer le proxy /api/
  apiProxy:
    enabled: false
    upstream: http://valoria-backend:3000
