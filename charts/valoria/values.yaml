namespace: valoria
 
sealedSecret:
  enabled: true
  encryptedData:
    db-host: 
    db-name: 
    db-password: 
    db-port: 
    db-user: 
    jwt-private-key: 
    jwt-public-key: 
    rcon-host: 
    rcon-password: 
    rcon-port: 
    stripe-publishable-key: 
    stripe-secret-key: 
imagePullSecrets:
  - name: ghcr-secret

frontend:
  image: ghcr.io/emmguardia/valoria-front@sha256:591fc5b1b0c4ce99289e47fa874ba391cc60344bf107b381607921799fa2011c
  imagePullPolicy: IfNotPresent
  replicas: 1
  serviceType: ClusterIP
  port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80

backend:
  image: ghcr.io/emmguardia/valoria-back@sha256:2575eba23c0bc45841084558c87875dcc68673d60f406978be7c477aa14abef9
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

nginx:
  apiProxy:
    enabled: true
    upstream: http://valoria-backend:3000

ingress:
  enabled: false
  className: ""
  annotations:
    kubernetes.io/ingress.class: traefik
  host: valoria.zenixweb.fr
  tls:
    enabled: false
    secretName: valoria-tls

