namespace: valoria

sealedSecret:
  enabled: true
  encryptedData:
    db-host: 
    db-name: 
    db-password: 
    db-port: 
    db-user: 
    jwt-private-key: 
    jwt-public-key: 
    rcon-host: 
    rcon-password: 
    rcon-port: 
    stripe-publishable-key: 
    stripe-secret-key: 
imagePullSecrets:
  - name: ghcr-secret

frontend:
  image: ghcr.io/emmguardia/valoria-front@sha256:3e21f265f9e863927bbc4d2701d3bdb58e790be75381e199a177ed7ac6d4945a
  imagePullPolicy: IfNotPresent
  replicas: 1
  serviceType: ClusterIP
  port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80

backend:
  image: ghcr.io/emmguardia/valoria-back@sha256:430702483ef475f738219ce6b5e0839b731f8e66f39d492dc562b230fdcee1fd
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

nginx:
  apiProxy:
    enabled: true
    upstream: http://valoria-backend:3000

ingress:
  enabled: false
  className: ""
  annotations:
    kubernetes.io/ingress.class: traefik
  host: valoria.zenixweb.fr
  tls:
    enabled: false
    secretName: valoria-tls
