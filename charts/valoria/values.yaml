namespace: valoria

sealedSecret:
  enabled: true
  encryptedData:
    db-host: 
    db-name: 
    db-password: 
    db-port: 
    db-user: 
    jwt-private-key: 
    jwt-public-key: 
    rcon-host: 
    rcon-password: 
    rcon-port: 
    stripe-publishable-key: 
    stripe-secret-key: 
imagePullSecrets:
  - name: ghcr-secret

frontend:
  image: ghcr.io/emmguardia/valoria-front@sha256:02c19a7e253e639008482944ec18b922c977832dc2ef939acc36371872eae9b8
  imagePullPolicy: IfNotPresent
  replicas: 1
  serviceType: ClusterIP
  port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80

backend:
  image: ghcr.io/emmguardia/valoria-back@sha256:f7414149ca3666ea4d06fba9b659e445fcbfd03a20099f7c469415574c91ddef
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

nginx:
  apiProxy:
    enabled: true
    upstream: http://valoria-backend:3000

ingress:
  enabled: false
  className: ""
  annotations:
    kubernetes.io/ingress.class: traefik
  host: valoria.zenixweb.fr
  tls:
    enabled: false
    secretName: valoria-tls
