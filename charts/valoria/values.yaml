namespace: valoria

sealedSecret:
  enabled: true
  encryptedData:
    jwt-private-key: 
    jwt-public-key: 
    tebex-project-id: 
    tebex-public-token: 
    tebex-secret-key: 

imagePullSecrets:
  - name: ghcr-secret

frontend:
  image: ghcr.io/emmguardia/valoria-front@sha256:9b3bf735de6cac7f022efec1f8442656d4ed1dd0d1a1e463f3228aaf99631858
  imagePullPolicy: IfNotPresent
  replicas: 1
  serviceType: ClusterIP
  port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80

backend:
  image: ghcr.io/emmguardia/valoria-back:latest
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

nginx:
  apiProxy:
    enabled: false
    upstream: http://valoria-backend:3000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: valoria.zenixweb.fr
  tls:
    enabled: true
    secretName: valoria-tls

tebex:
  checkoutBaseUrl: "https://checkout.tebex.io/package/"
  packageIds:
    "50": "7394413"
    "150": "7394413"
    "350": "7394413"
    "750": "7394413"
    "1650": "7394413"
