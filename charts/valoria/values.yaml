namespace: valoria

sealedSecret:
  enabled: true
  encryptedData:
    jwt-private-key: 
    jwt-public-key: 
    tebex-project-id: 
    tebex-public-token: 
    tebex-secret-key: 

imagePullSecrets:
  - name: ghcr-secret

frontend:
  image: ghcr.io/emmguardia/valoria-front@sha256:0c8b891e72a774ec56c4366d053a447ed9092446faac2ef51cdb66a531f63cd3
  imagePullPolicy: IfNotPresent
  replicas: 1
  serviceType: ClusterIP
  port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80

backend:
  image: ghcr.io/emmguardia/valoria-back@sha256:fc38af2e7f2888c0e025006b56d7e0a0ef89daec080b845db203e6318d7518ef
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

nginx:
  apiProxy:
    enabled: false
    upstream: http://valoria-backend:3000

ingress:
  enabled: true
  className: ""
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
    kubernetes.io/ingress.class: traefik
  host: valoria.zenixweb.fr
  tls:
    enabled: false
    secretName: valoria-tls

tebex:
  checkoutBaseUrl: "https://checkout.tebex.io/package/"
  packageIds:
    "50": "7394413"
    "150": "7394413"
    "350": "7394413"
    "750": "7394413"
    "1650": "7394413"
