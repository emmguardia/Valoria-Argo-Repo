namespace: valoria

sealedSecret:
  enabled: true
  encryptedData:
    db-host: 
    db-name: 
    db-password: 
    db-port: 
    db-user: 
    jwt-private-key: 
    jwt-public-key: 
    tebex-project-id: 
    tebex-public-token: 
    tebex-secret-key: 
imagePullSecrets:
  - name: ghcr-secret

frontend:
  image: ghcr.io/emmguardia/valoria-front@sha256:b6f193f15d58fb8865d5f971ae6a4fb4270f9aa1b99cea1af830c9563780be9c
  imagePullPolicy: IfNotPresent
  replicas: 1
  serviceType: ClusterIP
  port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80

backend:
  image: ghcr.io/emmguardia/valoria-back@sha256:c87cc8da5138815632ba0182a7561f3e89b35feb501a648cee1bb027c96b010b
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

nginx:
  apiProxy:
    enabled: false
    upstream: http://valoria-backend:3000

ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: traefik
  host: valoria.zenixweb.fr
  tls:
    enabled: false
    secretName: valoria-tls

tebex:
  checkoutBaseUrl: "https://checkout.tebex.io/package/"
  packageIds:
    "50": "7394413"
    "150": "7394413"
    "350": "7394413"
    "750": "7394413"
    "1650": "7394413"
