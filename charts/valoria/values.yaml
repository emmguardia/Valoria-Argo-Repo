namespace: valoria

sealedSecret:
  enabled: true
  encryptedData:
    db-host: 
    db-name: 
    db-password: 
    db-port: 
    db-user: 
    jwt-private-key: 
    jwt-public-key: 
    tebex-project-id: 
    tebex-public-token: 
    tebex-secret-key: 
imagePullSecrets:
  - name: ghcr-secret

frontend:
  image: ghcr.io/emmguardia/valoria-front@sha256:fc89f49f98db291251131f89a198e499ad1364c0aa33bf91ab3eccc9446dc763
  imagePullPolicy: IfNotPresent
  replicas: 1
  serviceType: ClusterIP
  port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80

backend:
  image: ghcr.io/emmguardia/valoria-back@sha256:93dbf67d5033cea169c6ab5da3aa6e861c915221e174cc26b2cd5e1ba00623b4
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

nginx:
  apiProxy:
    enabled: true
    upstream: http://valoria-backend:3000

ingress:
  enabled: false
  className: ""
  annotations:
    kubernetes.io/ingress.class: traefik
  host: valoria.zenixweb.fr
  tls:
    enabled: false
    secretName: valoria-tls

tebex:
  checkoutBaseUrl: "https://checkout.tebex.io/package/"
  packageIds:
    "50": "7394413"
    "150": "7394413"
    "350": "7394413"
    "750": "7394413"
    "1650": "7394413"
