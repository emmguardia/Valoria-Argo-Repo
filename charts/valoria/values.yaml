namespace: valoria

sealedSecret:
  enabled: false

imagePullSecrets:
  - name: ghcr-secret

frontend:
  # Image nginx (build du Frontend)
  image: ghcr.io/emmguardia/valoria-front@sha256:debac3247e83f28706eae51fe33d4f0ace948b2e6c52e65c0ad77947aed7cdd1
  imagePullPolicy: IfNotPresent
  replicas: 1
  serviceType: ClusterIP
  port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80

nginx:
  # Si tu as un backend plus tard, tu pourras activer le proxy /api/
  apiProxy:
    enabled: false
    upstream: http://valoria-backend:3000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: valoria.zenixweb.fr
  tls:
    enabled: true
    secretName: valoria-tls
